services:
  # PostgreSQL database
  - type: pserv
    name: ai-qa-db
    plan: free
    env: postgresql
    databaseName: tcgen

  # Spring Boot app (React UI embedded in the jar)
  - type: web
    name: ai-qa-assistant
    plan: free
    env: java
    buildCommand: mvn clean package -Pprod -DskipTests
    startCommand: java -jar target/ai-test-generator-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: OPENAI_API_KEY
        sync: false           # Render will prompt you to set this manually
      - key: DB_URL
        fromDatabase:
          name: ai-qa-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: ai-qa-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ai-qa-db
          property: password
