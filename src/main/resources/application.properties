# OpenAI — set OPENAI_API_KEY as an environment variable before running
openai.api-key=${OPENAI_API_KEY}
openai.base-url=https://api.openai.com
openai.model=gpt-4o

# Server — use Render's PORT env var if set, otherwise default to 8080
server.port=${PORT:8080}

# Logging
logging.level.com.example.aitestgenerator=DEBUG
